name: ai_health_assistant
publish_to: none
description: AI-first personal health assistant
version: 1.2.0+3

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2
  speech_to_text: ^7.0.0
  url_launcher: ^6.3.2
  permission_handler: ^12.0.3
  flutter_local_notifications: ^19.5.0
  timezone: ^0.10.1
  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
