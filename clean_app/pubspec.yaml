name: ai_health_assistant
publish_to: none
description: AI-first personal health assistant
version: 1.1.0+2

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  image_picker: ^1.1.2
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2
  speech_to_text: ^7.0.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
