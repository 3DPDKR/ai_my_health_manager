name: AI Health Assistant APK 1.2.6

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'clean_app/**'
      - 'scripts/**'
      - 'PROGRAM_GUIDE.md'
      - '.github/workflows/flutter-apk.yml'

permissions:
  contents: read

env:
  GRADLE_OPTS: -Dorg.gradle.vfs.watch=false -Dorg.gradle.daemon=false
  JAVA_TOOL_OPTIONS: -Dfile.encoding=UTF-8

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout latest main source
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Prepare Flutter and Android tooling
        shell: bash
        run: |
          set -euxo pipefail
          flutter --version
          flutter config --enable-android
          flutter precache --android
          flutter doctor -v

          SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(find "${ANDROID_SDK_ROOT}" -type f -name sdkmanager | head -n 1)"
          fi
          if [ -z "$SDKMANAGER" ] || [ ! -x "$SDKMANAGER" ]; then
            echo "sdkmanager was not found under ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}"
            exit 1
          fi

          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Preserve current application source
        shell: bash
        run: |
          set -euxo pipefail
          test -f clean_app/pubspec.yaml
          test -d clean_app/lib
          rm -rf /tmp/ai_health_source
          mkdir -p /tmp/ai_health_source
          cp clean_app/pubspec.yaml /tmp/ai_health_source/pubspec.yaml
          cp -R clean_app/lib /tmp/ai_health_source/lib

      - name: Recreate Android project from scratch
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf clean_app/android clean_app/build clean_app/.dart_tool clean_app/test
          cd clean_app
          flutter create --platforms=android --org com.aimyhealthmanager --project-name ai_health_assistant .
          cp /tmp/ai_health_source/pubspec.yaml pubspec.yaml
          rm -rf lib
          cp -R /tmp/ai_health_source/lib lib
          rm -f test/widget_test.dart

      - name: Apply Android app configuration
        shell: bash
        run: |
          set -euxo pipefail
          python3 scripts/configure_clean_android.py

      - name: Verify Android configuration
        shell: bash
        run: |
          set -euxo pipefail
          GRADLE_FILE=clean_app/android/app/build.gradle.kts
          if [ ! -f "$GRADLE_FILE" ]; then
            GRADLE_FILE=clean_app/android/app/build.gradle
          fi
          cat "$GRADLE_FILE"
          grep -E "compileSdk.*36|compileSdkVersion 36" "$GRADLE_FILE"
          grep -E "minSdk.*23|minSdkVersion 23" "$GRADLE_FILE"
          grep -E "targetSdk.*36|targetSdkVersion 36" "$GRADLE_FILE"
          grep -E "CoreLibraryDesugaring|coreLibraryDesugaring" "$GRADLE_FILE"

      - name: Install dependencies
        working-directory: clean_app
        run: flutter pub get

      - name: Analyze source
        working-directory: clean_app
        run: flutter analyze lib --no-fatal-infos --no-fatal-warnings

      - name: Build release APK
        working-directory: clean_app
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf build android/.gradle
          flutter build apk --release --no-tree-shake-icons

      - name: Prepare APK artifact
        shell: bash
        run: |
          set -euxo pipefail
          test -f clean_app/build/app/outputs/flutter-apk/app-release.apk
          cp clean_app/build/app/outputs/flutter-apk/app-release.apk AI_건강비서_v1.2.6.apk
          ls -lh AI_건강비서_v1.2.6.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-health-assistant-v1-2-6-apk
          path: AI_건강비서_v1.2.6.apk
          if-no-files-found: error
          retention-days: 30
