name: AI Health Assistant APK 1.2.5

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/flutter-apk.yml'

permissions:
  contents: read

env:
  GRADLE_OPTS: -Dorg.gradle.vfs.watch=false -Dorg.gradle.daemon=false
  JAVA_TOOL_OPTIONS: -Dfile.encoding=UTF-8

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout completed app source
        uses: actions/checkout@v4
        with:
          ref: clean-rebuild
          fetch-depth: 1

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Android SDK 36
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Recreate clean Android project
        shell: bash
        run: |
          rm -rf clean_app/android clean_app/build clean_app/.dart_tool
          cd clean_app
          flutter create --platforms=android --org com.aimyhealthmanager --project-name ai_health_assistant .
          rm -f test/widget_test.dart

      - name: Configure Android 36 and app settings
        run: python3 scripts/configure_clean_android.py

      - name: Verify generated Android settings
        shell: bash
        run: |
          echo "===== app Gradle ====="
          if [ -f clean_app/android/app/build.gradle.kts ]; then
            grep -nE "compileSdk|minSdk|targetSdk|Desugaring" clean_app/android/app/build.gradle.kts || true
          else
            grep -nE "compileSdk|minSdk|targetSdk|Desugaring" clean_app/android/app/build.gradle || true
          fi
          echo "===== gradle.properties ====="
          cat clean_app/android/gradle.properties

      - name: Install dependencies
        working-directory: clean_app
        run: flutter pub get

      - name: Analyze source
        working-directory: clean_app
        run: flutter analyze lib --no-fatal-infos --no-fatal-warnings

      - name: Clean Gradle state
        shell: bash
        run: |
          rm -rf ~/.gradle/caches/*/fileHashes ~/.gradle/caches/*/fileContent || true
          cd clean_app/android
          ./gradlew --stop || true
          ./gradlew clean --no-daemon -Dorg.gradle.vfs.watch=false

      - name: Build release APK
        working-directory: clean_app
        run: flutter build apk --release --no-tree-shake-icons

      - name: Prepare artifact
        run: cp clean_app/build/app/outputs/flutter-apk/app-release.apk AI_건강비서_v1.2.5.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-health-assistant-v1-2-5-apk
          path: AI_건강비서_v1.2.5.apk
          if-no-files-found: error
          retention-days: 30
