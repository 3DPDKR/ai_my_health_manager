name: Flutter APK

on:
  push:
    branches: [main, flutter-app]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/flutter-apk.yml'
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout flutter app source
        uses: actions/checkout@v4
        with:
          ref: flutter-app

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android platform
        working-directory: flutter_app
        run: |
          cp pubspec.yaml /tmp/pubspec.yaml
          cp lib/main.dart /tmp/main.dart
          flutter create --platforms=android --org com.aimyhealthmanager --project-name ai_my_health_manager .
          cp /tmp/pubspec.yaml pubspec.yaml
          cp /tmp/main.dart lib/main.dart
          rm -f test/widget_test.dart

      - name: Configure app source and Android permissions
        working-directory: flutter_app
        run: |
          python3 - <<'PY'
          from pathlib import Path

          main = Path('lib/main.dart')
          lines = main.read_text(encoding='utf-8').splitlines()

          import_line = "import 'package:flutter_localizations/flutter_localizations.dart';"
          if import_line not in lines:
              material_index = lines.index("import 'package:flutter/material.dart';")
              lines.insert(material_index + 1, import_line)

          if not any('localizationsDelegates:' in line for line in lines):
              for index, line in enumerate(lines):
                  if 'supportedLocales: const [' in line:
                      lines[index:index] = [
                          '      localizationsDelegates: const [',
                          '        GlobalMaterialLocalizations.delegate,',
                          '        GlobalWidgetsLocalizations.delegate,',
                          '        GlobalCupertinoLocalizations.delegate,',
                          '      ],',
                      ]
                      break

          start = None
          end = None
          for index, line in enumerate(lines):
              if 'final answer = candidates != null && candidates.isNotEmpty' in line:
                  start = index
              if start is not None and index > start and ": '응답을 읽지 못했습니다.';" in line:
                  end = index
                  break

          if start is None or end is None:
              raise SystemExit('Gemini parser block not found')

          replacement = [
              "      String answer = '응답을 읽지 못했습니다.';",
              '      if (candidates != null && candidates.isNotEmpty) {',
              '        final first = candidates.first;',
              '        if (first is Map<String, dynamic>) {',
              "          final content = first['content'];",
              '          if (content is Map<String, dynamic>) {',
              "            final responseParts = content['parts'];",
              '            if (responseParts is List && responseParts.isNotEmpty) {',
              '              final firstPart = responseParts.first;',
              '              if (firstPart is Map<String, dynamic>) {',
              "                answer = firstPart['text']?.toString() ?? answer;",
              '              }',
              '            }',
              '          }',
              '        }',
              '      }',
          ]
          lines[start:end + 1] = replacement
          main.write_text('\n'.join(lines) + '\n', encoding='utf-8')

          manifest = Path('android/app/src/main/AndroidManifest.xml')
          xml = manifest.read_text(encoding='utf-8')
          permission_lines = [
              '<uses-permission android:name="android.permission.INTERNET"/>',
              '<uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>',
              '<uses-permission android:name="android.permission.CAMERA"/>',
              '<uses-permission android:name="android.permission.RECORD_AUDIO"/>',
              '<uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>',
          ]
          if 'android.permission.INTERNET' not in xml:
              block = '\n    '.join(permission_lines)
              xml = xml.replace(
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">',
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    ' + block,
              )
          manifest.write_text(xml, encoding='utf-8')
          PY

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Analyze app source
        working-directory: flutter_app
        run: flutter analyze lib --no-fatal-infos --no-fatal-warnings

      - name: Build release APK
        working-directory: flutter_app
        run: flutter build apk --release

      - name: Rename APK
        run: cp flutter_app/build/app/outputs/flutter-apk/app-release.apk AI_건강비서_v2.2.0.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-health-assistant-v2-2-0-apk
          path: AI_건강비서_v2.2.0.apk
          if-no-files-found: error
          retention-days: 30
