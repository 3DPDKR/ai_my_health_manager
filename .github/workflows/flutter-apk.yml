name: AI Health Assistant APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/flutter-apk.yml'

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout completed app source
        uses: actions/checkout@v4
        with:
          ref: clean-rebuild

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android project
        run: |
          cp clean_app/pubspec.yaml /tmp/pubspec.yaml
          cp -r clean_app/lib /tmp/health_lib
          cd clean_app
          flutter create --platforms=android --org com.aimyhealthmanager --project-name ai_health_assistant .
          cp /tmp/pubspec.yaml pubspec.yaml
          rm -rf lib
          cp -r /tmp/health_lib lib
          rm -f test/widget_test.dart

      - name: Configure Android app
        run: python3 scripts/configure_clean_android.py

      - name: Install dependencies
        working-directory: clean_app
        run: flutter pub get

      - name: Analyze source
        working-directory: clean_app
        run: flutter analyze lib --no-fatal-infos --no-fatal-warnings

      - name: Build release APK
        working-directory: clean_app
        run: flutter build apk --release

      - name: Prepare artifact
        run: cp clean_app/build/app/outputs/flutter-apk/app-release.apk AI_건강비서_v1.2.3.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-health-assistant-v1-2-3-apk
          path: AI_건강비서_v1.2.3.apk
          if-no-files-found: error
          retention-days: 30
