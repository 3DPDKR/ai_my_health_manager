name: AI Health Assistant Product APK 1.3.2

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/flutter-apk.yml'
      - 'PROGRAM_GUIDE.md'

permissions:
  contents: read

env:
  JAVA_TOOL_OPTIONS: -Dfile.encoding=UTF-8
  GRADLE_OPTS: -Dorg.gradle.vfs.watch=false -Dorg.gradle.daemon=false

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout application source
        uses: actions/checkout@v4
        with:
          ref: clean-rebuild
          fetch-depth: 1

      - name: Verify application source
        shell: bash
        run: |
          set -euxo pipefail
          test -f clean_app/pubspec.yaml
          test -f clean_app/analysis_options.yaml
          test -f clean_app/lib/main.dart
          test -f clean_app/lib/src/product_health_home_v2.dart

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter 3.35.7
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          channel: stable
          cache: false

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        shell: bash
        run: |
          set -euxo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platform-tools' 'platforms;android-36' 'build-tools;35.0.0'
          flutter --version
          dart --version
          java -version

      - name: Create isolated Flutter project
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf /tmp/ai_health_build "$HOME/.gradle/caches" "$HOME/.gradle/daemon"
          mkdir -p /tmp/ai_health_build
          cd /tmp/ai_health_build
          flutter create --platforms=android --org com.aimyhealthmanager --project-name ai_health_assistant .
          cp "$GITHUB_WORKSPACE/clean_app/pubspec.yaml" pubspec.yaml
          cp "$GITHUB_WORKSPACE/clean_app/analysis_options.yaml" analysis_options.yaml
          rm -rf lib test
          cp -R "$GITHUB_WORKSPACE/clean_app/lib" lib

      - name: Pin verified Android build toolchain
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          app = Path('/tmp/ai_health_build')

          settings = app / 'android/settings.gradle.kts'
          text = settings.read_text(encoding='utf-8')
          text = re.sub(
              r'id\("com\.android\.application"\) version "[^"]+" apply false',
              'id("com.android.application") version "8.10.1" apply false',
              text,
              count=1,
          )
          text = re.sub(
              r'id\("org\.jetbrains\.kotlin\.android"\) version "[^"]+" apply false',
              'id("org.jetbrains.kotlin.android") version "2.1.0" apply false',
              text,
              count=1,
          )
          settings.write_text(text, encoding='utf-8')

          wrapper = app / 'android/gradle/wrapper/gradle-wrapper.properties'
          w = wrapper.read_text(encoding='utf-8')
          w = re.sub(
              r'distributionUrl=.*',
              r'distributionUrl=https\://services.gradle.org/distributions/gradle-8.11.1-bin.zip',
              w,
              count=1,
          )
          wrapper.write_text(w, encoding='utf-8')

          gradle = app / 'android/app/build.gradle.kts'
          g = gradle.read_text(encoding='utf-8')
          g = re.sub(r'compileSdk\s*=\s*(?:flutter\.compileSdkVersion|\d+)', 'compileSdk = 36', g, count=1)
          g = re.sub(r'minSdk\s*=\s*(?:flutter\.minSdkVersion|\d+)', 'minSdk = 23', g, count=1)
          g = re.sub(r'targetSdk\s*=\s*(?:flutter\.targetSdkVersion|\d+)', 'targetSdk = 36', g, count=1)
          if 'isCoreLibraryDesugaringEnabled = true' not in g:
              g = g.replace('compileOptions {', 'compileOptions {\n        isCoreLibraryDesugaringEnabled = true', 1)
          if 'coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:' not in g:
              g = g.rstrip() + '\n\ndependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.5")\n}\n'
          gradle.write_text(g, encoding='utf-8')

          manifest = app / 'android/app/src/main/AndroidManifest.xml'
          m = manifest.read_text(encoding='utf-8')
          marker = '<manifest xmlns:android="http://schemas.android.com/apk/res/android">'
          permissions = '''
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM"/>
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
              <uses-permission android:name="android.permission.READ_CALENDAR"/>
              <uses-permission android:name="android.permission.WRITE_CALENDAR"/>
          '''
          if 'android.permission.INTERNET' not in m:
              m = m.replace(marker, marker + permissions, 1)
          m = m.replace('android:label="ai_health_assistant"', 'android:label="AI 건강비서"')
          manifest.write_text(m, encoding='utf-8')
          PY

          grep -q 'version "8.10.1"' /tmp/ai_health_build/android/settings.gradle.kts
          grep -q 'version "2.1.0"' /tmp/ai_health_build/android/settings.gradle.kts
          grep -q 'gradle-8.11.1-bin.zip' /tmp/ai_health_build/android/gradle/wrapper/gradle-wrapper.properties
          grep -q 'compileSdk = 36' /tmp/ai_health_build/android/app/build.gradle.kts
          grep -q 'minSdk = 23' /tmp/ai_health_build/android/app/build.gradle.kts
          grep -q 'targetSdk = 36' /tmp/ai_health_build/android/app/build.gradle.kts

      - name: Install dependencies
        working-directory: /tmp/ai_health_build
        run: flutter pub get

      - name: Format verification
        working-directory: /tmp/ai_health_build
        run: dart format --output=none --set-exit-if-changed lib

      - name: Analyze Dart source
        working-directory: /tmp/ai_health_build
        run: flutter analyze lib --no-fatal-infos --no-fatal-warnings

      - name: Verify Gradle runtime
        working-directory: /tmp/ai_health_build/android
        run: ./gradlew --version

      - name: Build release APK
        working-directory: /tmp/ai_health_build
        shell: bash
        run: |
          set +e
          flutter build apk --release --no-tree-shake-icons --verbose > "$GITHUB_WORKSPACE/build-v1.3.2.log" 2>&1
          STATUS=$?
          if [ $STATUS -ne 0 ]; then
            echo '===== IMPORTANT BUILD ERRORS ====='
            grep -nEi 'FAILURE:|What went wrong|Execution failed|error:|exception|requires|compileSdk|minSdk|targetSdk|Caused by:' "$GITHUB_WORKSPACE/build-v1.3.2.log" | tail -n 200 || true
            echo '===== FINAL 300 LOG LINES ====='
            tail -n 300 "$GITHUB_WORKSPACE/build-v1.3.2.log" || true
            exit $STATUS
          fi

      - name: Prepare APK
        shell: bash
        run: |
          set -euxo pipefail
          APK=/tmp/ai_health_build/build/app/outputs/flutter-apk/app-release.apk
          test -s "$APK"
          cp "$APK" "$GITHUB_WORKSPACE/AI_건강비서_v1.3.2.apk"
          ls -lh "$GITHUB_WORKSPACE/AI_건강비서_v1.3.2.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-health-assistant-v1-3-2-apk
          path: AI_건강비서_v1.3.2.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ai-health-assistant-v1-3-2-build-log
          path: build-v1.3.2.log
          if-no-files-found: ignore
          retention-days: 14
