name: Flutter APK

on:
  push:
    branches: [flutter-app]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/flutter-apk.yml'
  pull_request:
    branches: [main]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/flutter-apk.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Generate Android platform
        working-directory: flutter_app
        run: |
          cp pubspec.yaml /tmp/pubspec.yaml
          mkdir -p /tmp/health_lib
          cp lib/main.dart /tmp/health_lib/main.dart
          flutter create --platforms=android --org com.aimyhealthmanager --project-name ai_my_health_manager .
          cp /tmp/pubspec.yaml pubspec.yaml
          cp /tmp/health_lib/main.dart lib/main.dart
      - name: Configure Android permissions and icon
        working-directory: flutter_app
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('android/app/src/main/AndroidManifest.xml')
          s=p.read_text()
          perms='''<uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>\n    <uses-permission android:name="android.permission.CAMERA"/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>\n    '''
          s=s.replace('<manifest xmlns:android="http://schemas.android.com/apk/res/android">','<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    '+perms)
          p.write_text(s)
          PY
          mkdir -p android/app/src/main/res/drawable android/app/src/main/res/drawable-v24 android/app/src/main/res/mipmap-anydpi-v26 android/app/src/main/res/values
          cat > android/app/src/main/res/values/colors.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?><resources><color name="ic_launcher_background">#FFFFFF</color></resources>
          EOF
          cat > android/app/src/main/res/drawable/ic_launcher_foreground.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#159447" android:pathData="M44,20 L64,20 L64,44 L88,44 L88,64 L64,64 L64,88 L44,88 L44,64 L20,64 L20,44 L44,44 Z"/>
            <path android:fillColor="#5BBF6A" android:pathData="M69,26 C79,19 90,20 94,22 C91,33 84,40 72,40 C72,34 71,30 69,26 Z"/>
          </vector>
          EOF
          cp android/app/src/main/res/drawable/ic_launcher_foreground.xml android/app/src/main/res/drawable-v24/ic_launcher_foreground.xml
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?><adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@color/ic_launcher_background"/><foreground android:drawable="@drawable/ic_launcher_foreground"/><monochrome android:drawable="@drawable/ic_launcher_foreground"/></adaptive-icon>
          EOF
          cp android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get
      - name: Build release APK
        working-directory: flutter_app
        run: flutter build apk --release
      - name: Rename APK
        run: cp flutter_app/build/app/outputs/flutter-apk/app-release.apk AI_건강비서_v2.1.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-health-assistant-v2-1-apk
          path: AI_건강비서_v2.1.apk
          if-no-files-found: error
          retention-days: 30
