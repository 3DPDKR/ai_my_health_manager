name: Flutter APK

on:
  push:
    branches: [main, flutter-app]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/flutter-apk.yml'
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout flutter app source
        uses: actions/checkout@v4
        with:
          ref: flutter-app

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android platform
        working-directory: flutter_app
        run: |
          cp pubspec.yaml /tmp/pubspec.yaml
          cp lib/main.dart /tmp/main.dart
          flutter create --platforms=android --org com.aimyhealthmanager --project-name ai_my_health_manager .
          cp /tmp/pubspec.yaml pubspec.yaml
          cp /tmp/main.dart lib/main.dart

      - name: Configure localization and Android permissions
        working-directory: flutter_app
        run: |
          python3 - <<'PY'
          from pathlib import Path

          main = Path('lib/main.dart')
          source = main.read_text(encoding='utf-8')
          localization_import = "import 'package:flutter_localizations/flutter_localizations.dart';"
          if localization_import not in source:
              source = source.replace(
                  "import 'package:flutter/material.dart';",
                  "import 'package:flutter/material.dart';\n" + localization_import,
              )
          locale_line = "supportedLocales: const [Locale('ko'), Locale('en'), Locale('ja'), Locale('zh')],"
          delegates = "localizationsDelegates: const [GlobalMaterialLocalizations.delegate, GlobalWidgetsLocalizations.delegate, GlobalCupertinoLocalizations.delegate],\n    " + locale_line
          if 'localizationsDelegates:' not in source:
              source = source.replace(locale_line, delegates)
          main.write_text(source, encoding='utf-8')

          manifest = Path('android/app/src/main/AndroidManifest.xml')
          xml = manifest.read_text(encoding='utf-8')
          permission_lines = [
              '<uses-permission android:name="android.permission.INTERNET"/>',
              '<uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>',
              '<uses-permission android:name="android.permission.CAMERA"/>',
              '<uses-permission android:name="android.permission.RECORD_AUDIO"/>',
              '<uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>',
          ]
          if 'android.permission.INTERNET' not in xml:
              block = '\n    '.join(permission_lines)
              xml = xml.replace(
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">',
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    ' + block,
              )
          manifest.write_text(xml, encoding='utf-8')
          PY

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Analyze
        working-directory: flutter_app
        run: flutter analyze --no-fatal-infos

      - name: Build release APK
        working-directory: flutter_app
        run: flutter build apk --release

      - name: Rename APK
        run: cp flutter_app/build/app/outputs/flutter-apk/app-release.apk AI_건강비서_v2.2.0.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-health-assistant-v2-2-0-apk
          path: AI_건강비서_v2.2.0.apk
          if-no-files-found: error
          retention-days: 30
