name: AI Health Assistant APK 1.2.8

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'PROGRAM_GUIDE.md'
      - '.github/workflows/flutter-apk.yml'

permissions:
  contents: read

env:
  GRADLE_OPTS: -Dorg.gradle.vfs.watch=false -Dorg.gradle.daemon=false
  JAVA_TOOL_OPTIONS: -Dfile.encoding=UTF-8

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout application source branch
        uses: actions/checkout@v4
        with:
          ref: clean-rebuild
          fetch-depth: 1

      - name: Verify application source
        shell: bash
        run: |
          set -euxo pipefail
          test -f clean_app/pubspec.yaml
          test -d clean_app/lib
          test -f scripts/configure_clean_android.py
          git rev-parse --short HEAD

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Android SDK tools
        uses: android-actions/setup-android@v3

      - name: Install Android 36 platform
        shell: bash
        run: |
          set -euxo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"
          test -d "${ANDROID_SDK_ROOT}/platforms/android-36"
          flutter --version
          flutter doctor -v

      - name: Preserve Flutter source
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf /tmp/ai_health_source
          mkdir -p /tmp/ai_health_source
          cp clean_app/pubspec.yaml /tmp/ai_health_source/pubspec.yaml
          cp -R clean_app/lib /tmp/ai_health_source/lib

      - name: Recreate Android project
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf clean_app/android clean_app/build clean_app/.dart_tool clean_app/test
          cd clean_app
          flutter create --platforms=android --org com.aimyhealthmanager --project-name ai_health_assistant .
          cp /tmp/ai_health_source/pubspec.yaml pubspec.yaml
          rm -rf lib
          cp -R /tmp/ai_health_source/lib lib
          rm -f test/widget_test.dart

      - name: Apply deterministic Android configuration
        shell: bash
        run: |
          set -euxo pipefail
          python3 scripts/configure_clean_android.py

      - name: Verify effective Android configuration
        shell: bash
        run: |
          set -euxo pipefail
          GRADLE_FILE=clean_app/android/app/build.gradle.kts
          test -f "$GRADLE_FILE"
          cat "$GRADLE_FILE"
          grep -F 'compileSdk = 36' "$GRADLE_FILE"
          grep -F 'minSdk = 23' "$GRADLE_FILE"
          grep -F 'targetSdk = 36' "$GRADLE_FILE"
          grep -F 'isCoreLibraryDesugaringEnabled = true' "$GRADLE_FILE"
          grep -F 'coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.5")' "$GRADLE_FILE"
          cat clean_app/android/gradle.properties

      - name: Install dependencies
        working-directory: clean_app
        run: flutter pub get

      - name: Analyze source
        working-directory: clean_app
        run: flutter analyze lib --no-fatal-infos --no-fatal-warnings

      - name: Build release APK
        working-directory: clean_app
        shell: bash
        run: |
          set -o pipefail
          rm -rf build android/.gradle
          flutter build apk --release --no-tree-shake-icons --verbose 2>&1 | tee ../flutter-build-v1.2.8.log

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ai-health-assistant-v1-2-8-build-log
          path: flutter-build-v1.2.8.log
          if-no-files-found: warn
          retention-days: 14

      - name: Prepare APK artifact
        if: success()
        shell: bash
        run: |
          set -euxo pipefail
          APK=clean_app/build/app/outputs/flutter-apk/app-release.apk
          test -s "$APK"
          cp "$APK" AI_건강비서_v1.2.8.apk
          ls -lh AI_건강비서_v1.2.8.apk

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ai-health-assistant-v1-2-8-apk
          path: AI_건강비서_v1.2.8.apk
          if-no-files-found: error
          retention-days: 30
