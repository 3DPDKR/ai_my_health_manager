name: Flutter APK

on:
  push:
    branches: [main, flutter-app]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/flutter-apk.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout flutter app source
        uses: actions/checkout@v4
        with:
          ref: flutter-app

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android platform
        working-directory: flutter_app
        run: |
          cp pubspec.yaml /tmp/pubspec.yaml
          mkdir -p /tmp/health_lib
          cp lib/main.dart /tmp/health_lib/main.dart
          flutter create --platforms=android --org com.aimyhealthmanager --project-name ai_my_health_manager .
          cp /tmp/pubspec.yaml pubspec.yaml
          cp /tmp/health_lib/main.dart lib/main.dart

      - name: Configure localization and Android permissions
        working-directory: flutter_app
        run: |
          python3 - <<'PY'
          from pathlib import Path

          main = Path('lib/main.dart')
          s = main.read_text()
          if "package:flutter_localizations/flutter_localizations.dart" not in s:
              s = s.replace(
                  "import 'package:flutter/material.dart';",
                  "import 'package:flutter/material.dart';\nimport 'package:flutter_localizations/flutter_localizations.dart';",
              )
          target = "supportedLocales: const [Locale('ko'), Locale('en'), Locale('ja'), Locale('zh')],"
          replacement = "localizationsDelegates: const [GlobalMaterialLocalizations.delegate, GlobalWidgetsLocalizations.delegate, GlobalCupertinoLocalizations.delegate],\n    supportedLocales: const [Locale('ko'), Locale('en'), Locale('ja'), Locale('zh')],"
          if 'localizationsDelegates:' not in s:
              s = s.replace(target, replacement)
          main.write_text(s)

          manifest = Path('android/app/src/main/AndroidManifest.xml')
          m = manifest.read_text()
          permissions = '''<uses-permission android:name="android.permission.INTERNET"/>
    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
    <uses-permission android:name="android.permission.CAMERA"/>
    <uses-permission android:name="android.permission.RECORD_AUDIO"/>
    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>
    '''
          if 'android.permission.INTERNET' not in m:
              m = m.replace(
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">',
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    ' + permissions,
              )
          manifest.write_text(m)
          PY

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Analyze
        working-directory: flutter_app
        run: flutter analyze --no-fatal-infos

      - name: Build release APK
        working-directory: flutter_app
        run: flutter build apk --release

      - name: Rename APK
        run: cp flutter_app/build/app/outputs/flutter-apk/app-release.apk AI_건강비서_v2.2.0.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-health-assistant-v2-2-0-apk
          path: AI_건강비서_v2.2.0.apk
          if-no-files-found: error
          retention-days: 30
